version: 2
updates:
  # Workspace JavaScript / TypeScript dependencies.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      typescript:
        patterns:
          - "typescript"
          - "ts-*"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
      observability:
        patterns:
          - "@sentry/*"
          - "posthog-*"

  # GitHub Actions used in .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
