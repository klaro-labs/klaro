# Foundry config for Klaro contracts.
# Arc target = Prague EVM (verified iter 41 in build plan).
# Strict warnings + via_ir off for clear stack traces during M1 dev.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
evm_version = "prague"           # Arc targets Prague hardfork
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 2
fs_permissions = [{ access = "read", path = "./" }]

# Fail the build on any warning until M11; we want zero-warning contracts
# before audit prep. Foundry 1.5+ syntax is `deny = warnings` (string list).
# deny = ["warnings"]              # uncomment at M11 audit gate

[profile.ci]
verbosity = 4
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32 }

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
